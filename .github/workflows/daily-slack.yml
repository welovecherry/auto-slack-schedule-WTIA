name: Daily Slack Schedule

on:
  schedule:
    # 00:00 UTC = 5:00 PM Pacific the PREVIOUS day (PDT, summer).
    - cron: '0 0 * * *'  # Runs at 00:00 UTC (5 PM Pacific previous day)
  workflow_dispatch:
    inputs:
      force_date:
        description: 'Test a specific date (YYYY-MM-DD). Leave blank to use tomorrow.'
        required: false
        default: ''

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Send tomorrow's schedule to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          FORCE_DATE: ${{ github.event.inputs.force_date }}
        run: python send_schedule.py
